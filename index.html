<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1;
        }
        .calc-btn {
            height: 60px;
            font-size: 1.2rem;
        }
        .calc-display {
            height: 80px;
            font-size: 2.5rem;
            text-align: right;
            background-color: #e9ecef;
        }
        /* Стилі для правильного відображення вкладок на синьому фоні */
        .nav-tabs .nav-link:not(.active) {
            color: rgba(255, 255, 255, 0.85); 
        }
        .nav-tabs .nav-link:not(.active):hover {
            color: #ffffff; 
            border-color: transparent;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">CalcApp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Калькулятор</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="profile.html">Профіль</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">Про додаток</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Вхід</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="register.html">Реєстрація</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-header bg-primary">
                        <ul class="nav nav-tabs card-header-tabs" id="calcTabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" id="standard-tab" data-bs-toggle="tab" href="#standard" role="tab">Звичайний</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" id="programmer-tab" data-bs-toggle="tab" href="#programmer" role="tab">Для програміста</a>
                            </li>
                        </ul>
                    </div>
                    
                    <div class="card-body tab-content" id="calcTabsContent">
                        
                        <div class="tab-pane fade show active" id="standard" role="tabpanel">
                            <input type="text" class="form-control mb-3 calc-display" value="0" readonly>
                            <div class="row g-2">
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">C</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">±</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">%</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn">÷</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">7</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">8</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">9</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn">×</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">4</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">5</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">6</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn">-</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">1</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">2</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">3</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn">+</button></div>
                                
                                <div class="col-6"><button class="btn btn-light w-100 calc-btn">0</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">,</button></div>
                                <div class="col-3"><button class="btn btn-success w-100 calc-btn">=</button></div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="programmer" role="tabpanel">
                            <input type="text" class="form-control mb-2 calc-display" value="0" readonly>
                            <div class="mb-3 font-monospace small px-1">
                                <div>HEX: 0</div>
                                <div class="text-primary fw-bold">DEC: 0</div>
                                <div>OCT: 0</div>
                                <div>BIN: 0000 0000</div>
                            </div>
                            <div class="row g-2">
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">A</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">B</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">C</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">AND</button></div>
                                
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">D</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">E</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn">F</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">OR</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">7</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">8</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">9</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">XOR</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">4</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">5</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">6</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">NOT</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">1</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">2</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn">3</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">&lt;&lt;</button></div>
                                
                                <div class="col-6"><button class="btn btn-light w-100 calc-btn">0</button></div>
                                <div class="col-3"><button class="btn btn-success w-100 calc-btn">=</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn">&gt;&gt;</button></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 CalcApp. Розробив: Андрій Кравець, КВ-32.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
